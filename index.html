<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wilfred AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🤖 Wilfred AI</h1>
    <p>Create amazing AI videos from your ideas.</p>
</header>

<div class="container">

<textarea id="prompt" placeholder="Describe the video you want to create..."></textarea>

<br><br>

<select id="style">
<option>Realistic</option>
<option>Cinematic</option>
<option>Anime</option>
<option>Documentary</option>
<option>Motivational</option>
</select>

<br><br>

<select id="duration">
<option>15 Seconds</option>
<option>30 Seconds</option>
<option>60 Seconds</option>
</select>

<br><br>

<button id="generateBtn">Generate AI Video</button>

<p id="status"></p>

</div>

<script src="script.js"></script>

</body>
</html>
